    <!-- Script global de rastreamento Facebook Pixel -->
    <script>
    document.addEventListener('click', function(e) {
      const el = e.target.closest('button, a');
      if (!el) return;

      const text = (el.innerText || '').toLowerCase();

      if (typeof fbq === 'undefined') return;

      // Início do quiz
      if (text.includes('começar') || text.includes('iniciar')) {
        fbq('trackCustom', 'QuizStart');
      }

      // Resultado / plano
      if (text.includes('ver meu plano') || text.includes('resultado')) {
        fbq('trackCustom', 'QuizResultView');
      }

      // Clique na oferta
      if (text.includes('plano recomendado') || text.includes('quero') && text.includes('filho')) {
        fbq('trackCustom', 'OfferClick');
      }

      // Checkout
      if (text.includes('comprar') || text.includes('começar agora')) {
        fbq('track', 'InitiateCheckout');
      }
    });
    </script>

      function setBackRedirect(url) {
        let urlBackRedirect = url;
        urlBackRedirect = urlBackRedirect.trim() +
          (urlBackRedirect.indexOf('?') > 0 ? '&' : '?') +
          document.location.search.replace('?', '').toString();

        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);

        window.addEventListener('popstate', () => {
          setTimeout(() => {
            location.href = urlBackRedirect;
          }, 1);
        });
      }

      setBackRedirect(link);
    </script>
